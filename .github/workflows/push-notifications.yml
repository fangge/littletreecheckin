name: Push Notifications Scheduler

on:
  schedule:
    # 早晨推送 - 每天 8:00 中国时间 (0:00 UTC)
    - cron: '0 0 * * *'
    # 中午推送 - 每天 12:00 中国时间 (4:00 UTC)
    - cron: '0 4 * * *'
    # 晚上推送 - 每天 21:30 中国时间 (13:30 UTC)
    - cron: '30 13 * * *'
  
  # 允许手动触发
  workflow_dispatch:
    inputs:
      schedule_type:
        description: '推送类型'
        required: true
        type: choice
        options:
          - morning
          - noon
          - evening

jobs:
  send-push-notifications:
    runs-on: ubuntu-latest
    
    steps:
      - name: 确定推送类型
        id: determine-type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.schedule_type }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            MINUTE=$(date -u +%M)
            
            if [ "$HOUR" = "00" ]; then
              echo "type=morning" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "04" ]; then
              echo "type=noon" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "13" ] && [ "$MINUTE" = "30" ]; then
              echo "type=evening" >> $GITHUB_OUTPUT
            else
              echo "type=unknown" >> $GITHUB_OUTPUT
            fi
          fi
      
      - name: 发送推送通知
        env:
          API_URL: ${{ secrets.API_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          TYPE="${{ steps.determine-type.outputs.type }}"
          
          if [ "$TYPE" = "unknown" ]; then
            echo "❌ 无法确定推送类型"
            exit 1
          fi
          
          echo "📱 发送 $TYPE 推送通知..."
          
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${API_URL}/api/v1/push/cron/${TYPE}")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ 推送发送成功"
          else
            echo "❌ 推送发送失败"
            exit 1
          fi
      
      - name: 记录执行结果
        if: always()
        run: |
          echo "执行时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "推送类型: ${{ steps.determine-type.outputs.type }}"
